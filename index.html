<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Log — Anime Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23121018'/%3E%3Crect x='6' y='9' width='20' height='14' rx='2' fill='none' stroke='%23f2a154' stroke-width='2'/%3E%3Cpolygon points='14,13 14,19 20,16' fill='%23f2a154'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Tokens ---------- */
  :root{
    --bg: #121018;
    --bg-deep: #0c0b11;
    --surface: #1c1924;
    --surface-2: #262230;
    --surface-3: #312c3a;
    --border: #38323f;
    --text: #f1ece2;
    --text-dim: #aea5b9;
    --text-faint: #756d83;

    --watching: #f2a154;
    --watching-soft: rgba(242,161,84,0.14);
    --completed: #8fb88f;
    --completed-soft: rgba(143,184,143,0.14);
    --plan: #7e9cd1;
    --plan-soft: rgba(126,156,209,0.14);
    --dropped: #e07a6b;
    --dropped-soft: rgba(224,122,107,0.14);

    --shadow: 0 10px 30px rgba(0,0,0,0.4);
    --radius: 10px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Work Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }
  body{
    background: linear-gradient(180deg, #161320 0%, var(--bg-deep) 100%);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a{ color: var(--watching); text-decoration: none; }
  a:hover{ text-decoration: underline; }

  button{
    font-family: var(--font-body);
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }
  input, select{
    font-family: var(--font-body);
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  input:focus-visible, select:focus-visible, button:focus-visible, [tabindex]:focus-visible{
    outline: 2px solid var(--watching);
    outline-offset: 2px;
  }

  .wrap{
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ---------- Header ---------- */
  .header{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .brand-mark{
    font-family: var(--font-display);
    font-size: 2.6rem;
    letter-spacing: 1px;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark .clapper{
    display: inline-flex;
    width: 30px; height: 30px;
    border: 2px solid var(--watching);
    border-radius: 5px;
    align-items: center;
    justify-content: center;
  }
  .brand-mark .clapper svg{ width: 14px; height: 14px; fill: var(--watching); }
  .tagline{
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .stats-line{
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--text-faint);
    margin-top: 8px;
    letter-spacing: 0.3px;
  }
  .stats-line strong{ color: var(--watching); font-weight: 600; }

  .btn{
    border-radius: 7px;
    padding: 10px 18px;
    font-weight: 600;
    font-size: 0.92rem;
    transition: transform .15s ease, background .15s ease;
  }
  .btn-primary{
    background: var(--watching);
    color: #18130b;
  }
  .btn-primary:hover{ filter: brightness(1.08); }
  .btn-ghost{
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover{ background: var(--surface-3); }
  .btn-small{
    padding: 6px 10px;
    font-size: 0.78rem;
    border-radius: 6px;
  }
  @media (prefers-reduced-motion: no-preference){
    .btn:active{ transform: scale(0.97); }
  }

  /* ---------- Toolbar ---------- */
  .toolbar{
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .tabs{
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    flex: 1 1 auto;
  }
  .tab{
    white-space: nowrap;
    padding: 7px 13px;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 500;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .tab.active{
    background: var(--watching-soft);
    border-color: var(--watching);
    color: var(--watching);
  }
  .search-mine{
    width: 220px;
    flex: 0 0 auto;
  }

  /* ---------- Grid / cards ---------- */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--plan);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }
  .card[data-status="watching"]{ border-left-color: var(--watching); }
  .card[data-status="completed"]{ border-left-color: var(--completed); }
  .card[data-status="plan"]{ border-left-color: var(--plan); }
  .card[data-status="dropped"]{ border-left-color: var(--dropped); }

  .card-top{
    display: flex;
    gap: 12px;
    padding: 14px 14px 0;
  }
  .poster{
    width: 64px;
    height: 90px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface-2);
    flex-shrink: 0;
  }
  .poster-fallback{
    width: 64px;
    height: 90px;
    border-radius: 6px;
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-faint);
    font-size: 1.4rem;
  }
  .card-meta{ min-width: 0; flex: 1; }
  .card-title{
    font-weight: 600;
    font-size: 0.96rem;
    line-height: 1.25;
    margin: 0 0 6px;
    word-break: break-word;
  }
  .card-title a{ color: var(--text); }
  .season-input{
    width: 100%;
    font-size: 0.78rem;
    padding: 5px 8px;
    margin-bottom: 6px;
  }
  .status-select{
    width: 100%;
    font-size: 0.78rem;
    padding: 5px 8px;
  }
  .status-select[data-status="watching"]{ color: var(--watching); }
  .status-select[data-status="completed"]{ color: var(--completed); }
  .status-select[data-status="plan"]{ color: var(--plan); }
  .status-select[data-status="dropped"]{ color: var(--dropped); }

  .card-body{ padding: 12px 14px 14px; }

  .ep-row{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .stepper-btn{
    width: 26px; height: 26px;
    border-radius: 5px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .stepper-btn:hover{ background: var(--surface-3); color: var(--text); }
  .ep-counter{
    font-family: var(--font-mono);
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }
  .ep-counter input{
    background: transparent;
    border: none;
    width: 38px;
    padding: 0;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 0.86rem;
    color: var(--watching);
  }
  .ep-counter .ep-total{
    font-size: 0.86rem;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .ep-label{
    font-size: 0.68rem;
    letter-spacing: 0.5px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .sprockets{
    height: 4px;
    background-image: radial-gradient(circle, var(--bg-deep) 1.4px, transparent 1.6px);
    background-size: 8px 4px;
    opacity: 0.7;
  }
  .progress-track{
    height: 9px;
    background: var(--surface-2);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .progress-fill{
    height: 100%;
    transition: width .25s ease;
  }
  .progress-indeterminate{
    height: 100%;
    width: 100%;
    background-image: repeating-linear-gradient(
      45deg,
      var(--bar-color, var(--watching)) 0,
      var(--bar-color, var(--watching)) 6px,
      transparent 6px,
      transparent 12px
    );
    opacity: 0.55;
  }
  @media (prefers-reduced-motion: no-preference){
    .progress-indeterminate{
      animation: shift 1.2s linear infinite;
    }
  }
  @keyframes shift{
    from{ background-position: 0 0; }
    to{ background-position: 17px 0; }
  }

  .card-footer{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .mal-link{ font-size: 0.72rem; color: var(--text-faint); }
  .remove-btn{
    font-size: 0.72rem;
    color: var(--dropped);
    padding: 4px 6px;
  }
  .remove-btn:hover{ text-decoration: underline; }

  /* ---------- Empty state ---------- */
  .empty-state{
    grid-column: 1 / -1;
    text-align: center;
    padding: 70px 20px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
  }
  .empty-state .big{
    font-family: var(--font-display);
    font-size: 1.8rem;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .empty-state p{ margin: 0 0 18px; font-size: 0.9rem; }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position: fixed; inset: 0;
    background: rgba(8,7,11,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal-backdrop.open{ display: flex; }
  .modal{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    max-height: 86vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  .modal-head{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h2{
    font-family: var(--font-display);
    font-size: 1.3rem;
    letter-spacing: 0.5px;
    margin: 0;
  }
  .modal-close{ font-size: 1.3rem; color: var(--text-dim); padding: 2px 6px; }
  .modal-close:hover{ color: var(--text); }
  .modal-body{
    padding: 16px 18px;
    overflow-y: auto;
    flex: 1;
  }
  .search-box{ width: 100%; margin-bottom: 12px; font-size: 0.92rem; }
  .search-hint{ font-size: 0.78rem; color: var(--text-faint); margin: 0 0 14px; }
  .results-list{ display: flex; flex-direction: column; gap: 8px; }
  .result-row{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    background: var(--surface-2);
  }
  .result-row img, .result-row .poster-fallback{
    width: 38px; height: 54px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .result-info{ flex: 1; min-width: 0; }
  .result-title{ font-size: 0.86rem; font-weight: 500; line-height: 1.2; }
  .result-sub{ font-size: 0.74rem; color: var(--text-faint); }
  .result-add-btn{
    background: var(--watching-soft);
    color: var(--watching);
    border: 1px solid var(--watching);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.76rem;
    font-weight: 600;
    flex-shrink: 0;
  }
  .result-add-btn:hover{ background: var(--watching); color: #18130b; }
  .result-add-btn:disabled{
    opacity: 0.5;
    border-color: var(--border);
    background: transparent;
    color: var(--text-faint);
    cursor: default;
  }
  .search-status{ font-size: 0.8rem; color: var(--text-faint); padding: 10px 2px; }

  .manual-toggle{
    display: block;
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--text-faint);
  }
  .manual-form{
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .manual-form.open{ display: flex; }
  .manual-form label{ font-size: 0.74rem; color: var(--text-faint); display: block; margin-bottom: 3px; }
  .manual-form input{ width: 100%; font-size: 0.86rem; }
  .manual-form .row{ display: flex; gap: 8px; }
  .manual-form .row > div{ flex: 1; }

  /* ---------- Footer ---------- */
  .footer{
    margin-top: 50px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 0.78rem;
    color: var(--text-faint);
  }
  .footer-actions{ display: flex; gap: 8px; }

  /* ---------- Toast ---------- */
  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface-3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 100;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .visually-hidden{
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="header">
    <div>
      <div class="brand-mark">
        <span class="clapper" aria-hidden="true">
          <svg viewBox="0 0 24 24"><polygon points="6,4 6,20 20,12"/></svg>
        </span>
        WATCH LOG
      </div>
      <div class="tagline">Your personal anime viewing record.</div>
      <div class="stats-line" id="statsLine">0 titles · 0 episodes watched</div>
    </div>
    <button class="btn btn-primary" id="openAddBtn">+ Add Anime</button>
  </header>

  <div class="toolbar">
    <div class="tabs" id="tabs" role="tablist" aria-label="Filter by status"></div>
    <input class="search-mine" id="searchMine" type="search" placeholder="Filter your log…" aria-label="Filter your log by title">
  </div>

  <div class="grid" id="grid"></div>

  <footer class="footer">
    <span>Stored locally in this browser. Export a backup before clearing browser data or switching devices.</span>
    <div class="footer-actions">
      <button class="btn btn-ghost btn-small" id="exportBtn">Export JSON</button>
      <button class="btn btn-ghost btn-small" id="importBtn">Import JSON</button>
      <input type="file" id="importFile" accept="application/json" class="visually-hidden">
    </div>
  </footer>
</div>

<!-- Add Anime Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <h2 id="modalTitle">Add Anime</h2>
      <button class="modal-close" id="closeModalBtn" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <input class="search-box" id="searchInput" type="text" placeholder="Search by title…" autocomplete="off">
      <p class="search-hint">Results come from MyAnimeList. Tap a title to add it to your log.</p>
      <div class="results-list" id="resultsList"></div>
      <div class="search-status" id="searchStatus"></div>

      <a href="#" class="manual-toggle" id="manualToggle">Can't find it? Add manually →</a>
      <div class="manual-form" id="manualForm">
        <div>
          <label for="manualTitle">Title</label>
          <input id="manualTitle" type="text" placeholder="e.g. Some Obscure OVA">
        </div>
        <div class="row">
          <div>
            <label for="manualTotal">Total episodes (optional)</label>
            <input id="manualTotal" type="number" min="0" placeholder="Leave blank if unknown">
          </div>
        </div>
        <div>
          <label for="manualImage">Poster image URL (optional)</label>
          <input id="manualImage" type="text" placeholder="https://…">
        </div>
        <button class="btn btn-primary btn-small" id="manualAddBtn" style="align-self:flex-start; margin-top:4px;">Add to log</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "watchlog.entries.v1";
  var statusMeta = {
    watching:  { label: "Watching",      color: "var(--watching)" },
    completed: { label: "Completed",     color: "var(--completed)" },
    plan:      { label: "Plan to Watch", color: "var(--plan)" },
    dropped:   { label: "Dropped",       color: "var(--dropped)" }
  };
  var statusOrder = ["watching", "completed", "plan", "dropped"];

  var state = {
    entries: loadEntries(),
    filterStatus: "all",
    searchQuery: "",
    searchTimer: null,
    addedApiIds: {}
  };

  // ---------- storage ----------
  function loadEntries(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return [];
      var parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      console.error("Failed to load entries", e);
      return [];
    }
  }
  function saveEntries(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
    }catch(e){
      console.error("Failed to save entries", e);
      showToast("Couldn't save — your browser storage may be full.");
    }
  }

  function uid(){
    return "id" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function escapeHtml(str){
    var div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  // ---------- toast ----------
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 2600);
  }

  // ---------- stats & tabs ----------
  function renderStats(){
    var totalTitles = state.entries.length;
    var totalEpisodes = state.entries.reduce(function(sum, e){
      return sum + (Number(e.currentEpisode) || 0);
    }, 0);
    document.getElementById("statsLine").innerHTML =
      "<strong>" + totalTitles + "</strong> title" + (totalTitles === 1 ? "" : "s") +
      " · <strong>" + totalEpisodes + "</strong> episode" + (totalEpisodes === 1 ? "" : "s") + " watched";
  }

  function renderTabs(){
    var counts = { all: state.entries.length, watching: 0, completed: 0, plan: 0, dropped: 0 };
    state.entries.forEach(function(e){ if(counts[e.status] != null) counts[e.status]++; });

    var tabsEl = document.getElementById("tabs");
    var defs = [{ key: "all", label: "All" }].concat(statusOrder.map(function(k){
      return { key: k, label: statusMeta[k].label };
    }));

    tabsEl.innerHTML = defs.map(function(d){
      var active = state.filterStatus === d.key ? " active" : "";
      return '<button class="tab' + active + '" data-filter="' + d.key + '" role="tab" aria-selected="' +
        (state.filterStatus === d.key) + '">' + d.label + " (" + counts[d.key] + ")</button>";
    }).join("");
  }

  // ---------- grid ----------
  function visibleEntries(){
    var list = state.entries.slice();
    if(state.filterStatus !== "all"){
      list = list.filter(function(e){ return e.status === state.filterStatus; });
    }
    if(state.searchQuery){
      var q = state.searchQuery.toLowerCase();
      list = list.filter(function(e){ return e.title.toLowerCase().indexOf(q) !== -1; });
    }
    list.sort(function(a, b){ return (b.updatedAt || 0) - (a.updatedAt || 0); });
    return list;
  }

  function progressHtml(entry){
    var color = "var(--" + entry.status + ")";
    if(entry.totalEpisodes){
      var pct = Math.min(100, Math.round((Number(entry.currentEpisode) || 0) / entry.totalEpisodes * 100));
      return '<div class="sprockets"></div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
        '<div class="sprockets"></div>';
    }
    return '<div class="sprockets"></div>' +
      '<div class="progress-track"><div class="progress-indeterminate" style="--bar-color:' + color + ';"></div></div>' +
      '<div class="sprockets"></div>';
  }

  function cardHtml(entry){
    var posterHtml = entry.image
      ? '<img class="poster" src="' + escapeHtml(entry.image) + '" alt="" loading="lazy">'
      : '<div class="poster-fallback" aria-hidden="true">🎬</div>';

    var titleInner = entry.malId
      ? '<a href="https://myanimelist.net/anime/' + encodeURIComponent(entry.malId) + '" target="_blank" rel="noopener">' + escapeHtml(entry.title) + "</a>"
      : escapeHtml(entry.title);

    var totalLabel = entry.totalEpisodes ? ("/ " + entry.totalEpisodes) : "/ ??";

    var statusOptions = statusOrder.map(function(k){
      var sel = entry.status === k ? " selected" : "";
      return '<option value="' + k + '"' + sel + ">" + statusMeta[k].label + "</option>";
    }).join("");

    var malLink = entry.malId
      ? '<a class="mal-link" href="https://myanimelist.net/anime/' + encodeURIComponent(entry.malId) + '" target="_blank" rel="noopener">View on MAL ↗</a>'
      : "<span></span>";

    return (
      '<article class="card" data-id="' + entry.id + '" data-status="' + entry.status + '">' +
        '<div class="card-top">' +
          posterHtml +
          '<div class="card-meta">' +
            '<h3 class="card-title">' + titleInner + "</h3>" +
            '<input class="season-input" data-action="season" type="text" value="' + escapeHtml(entry.season || "") + '" placeholder="Season / arc">' +
            '<select class="status-select" data-action="status" data-status="' + entry.status + '">' + statusOptions + "</select>" +
          "</div>" +
        "</div>" +
        '<div class="card-body">' +
          '<div class="ep-label">Episode progress</div>' +
          '<div class="ep-row">' +
            '<button class="stepper-btn" data-action="dec" aria-label="Decrease episode">−</button>' +
            '<div class="ep-counter">' +
              '<input data-action="ep-input" type="number" min="0" value="' + (Number(entry.currentEpisode) || 0) + '" aria-label="Current episode">' +
              '<span class="ep-total">' + totalLabel + "</span>" +
            "</div>" +
            '<button class="stepper-btn" data-action="inc" aria-label="Increase episode">+</button>' +
          "</div>" +
          progressHtml(entry) +
          '<div class="card-footer">' +
            malLink +
            '<button class="remove-btn" data-action="remove">Remove</button>' +
          "</div>" +
        "</div>" +
      "</article>"
    );
  }

  function renderGrid(){
    var grid = document.getElementById("grid");
    var list = visibleEntries();

    if(state.entries.length === 0){
      grid.innerHTML =
        '<div class="empty-state">' +
          '<div class="big">Your log is empty</div>' +
          "<p>Search for the first anime you've watched and start tracking your progress.</p>" +
          '<button class="btn btn-primary" id="emptyAddBtn">+ Add Anime</button>' +
        "</div>";
      var btn = document.getElementById("emptyAddBtn");
      if(btn) btn.addEventListener("click", openModal);
      return;
    }

    if(list.length === 0){
      grid.innerHTML = '<div class="empty-state"><div class="big">No matches</div><p>Try a different filter or search term.</p></div>';
      return;
    }

    grid.innerHTML = list.map(cardHtml).join("");
  }

  function render(){
    renderStats();
    renderTabs();
    renderGrid();
  }

  // ---------- entry mutations ----------
  function addEntry(data){
    var entry = {
      id: uid(),
      malId: data.malId || null,
      title: data.title,
      image: data.image || "",
      season: "",
      status: "plan",
      currentEpisode: 0,
      totalEpisodes: data.totalEpisodes || null,
      updatedAt: Date.now()
    };
    state.entries.push(entry);
    saveEntries();
    render();
    return entry;
  }

  function updateEntry(id, patch){
    var entry = state.entries.find(function(e){ return e.id === id; });
    if(!entry) return;
    Object.assign(entry, patch);
    entry.updatedAt = Date.now();

    // Friendly auto-status nudges (still overridable by the person)
    if(patch.currentEpisode != null && entry.status !== "dropped"){
      if(entry.totalEpisodes && entry.currentEpisode >= entry.totalEpisodes){
        entry.status = "completed";
      } else if(entry.currentEpisode > 0 && entry.status === "plan"){
        entry.status = "watching";
      } else if(entry.currentEpisode === 0 && entry.status === "completed"){
        entry.status = "plan";
      }
    }
    saveEntries();
    render();
  }

  function removeEntry(id){
    var entry = state.entries.find(function(e){ return e.id === id; });
    if(!entry) return;
    if(!confirm('Remove "' + entry.title + '" from your log?')) return;
    state.entries = state.entries.filter(function(e){ return e.id !== id; });
    saveEntries();
    render();
    showToast("Removed from your log.");
  }

  // ---------- grid event delegation ----------
  document.getElementById("grid").addEventListener("click", function(ev){
    var actionEl = ev.target.closest("[data-action]");
    if(!actionEl) return;
    var card = ev.target.closest(".card");
    if(!card) return;
    var id = card.getAttribute("data-id");
    var entry = state.entries.find(function(e){ return e.id === id; });
    if(!entry) return;

    var action = actionEl.getAttribute("data-action");
    if(action === "inc"){
      var next = (Number(entry.currentEpisode) || 0) + 1;
      updateEntry(id, { currentEpisode: next });
    } else if(action === "dec"){
      var prev = Math.max(0, (Number(entry.currentEpisode) || 0) - 1);
      updateEntry(id, { currentEpisode: prev });
    } else if(action === "remove"){
      removeEntry(id);
    }
  });

  document.getElementById("grid").addEventListener("change", function(ev){
    var card = ev.target.closest(".card");
    if(!card) return;
    var id = card.getAttribute("data-id");
    var action = ev.target.getAttribute("data-action");

    if(action === "ep-input"){
      var val = Math.max(0, parseInt(ev.target.value, 10) || 0);
      updateEntry(id, { currentEpisode: val });
    } else if(action === "season"){
      updateEntry(id, { season: ev.target.value });
    } else if(action === "status"){
      updateEntry(id, { status: ev.target.value });
    }
  });

  // ---------- tabs & filter search ----------
  document.getElementById("tabs").addEventListener("click", function(ev){
    var btn = ev.target.closest(".tab");
    if(!btn) return;
    state.filterStatus = btn.getAttribute("data-filter");
    render();
  });

  document.getElementById("searchMine").addEventListener("input", function(ev){
    state.searchQuery = ev.target.value.trim();
    renderGrid();
  });

  // ---------- modal: add anime ----------
  var modalBackdrop = document.getElementById("modalBackdrop");
  var searchInput = document.getElementById("searchInput");
  var resultsList = document.getElementById("resultsList");
  var searchStatus = document.getElementById("searchStatus");

  function openModal(){
    modalBackdrop.classList.add("open");
    state.addedApiIds = {};
    resultsList.innerHTML = "";
    searchStatus.textContent = "";
    searchInput.value = "";
    document.getElementById("manualForm").classList.remove("open");
    document.getElementById("manualTitle").value = "";
    document.getElementById("manualTotal").value = "";
    document.getElementById("manualImage").value = "";
    setTimeout(function(){ searchInput.focus(); }, 30);
  }
  function closeModal(){
    modalBackdrop.classList.remove("open");
  }

  document.getElementById("openAddBtn").addEventListener("click", openModal);
  document.getElementById("closeModalBtn").addEventListener("click", closeModal);
  modalBackdrop.addEventListener("click", function(ev){
    if(ev.target === modalBackdrop) closeModal();
  });
  document.addEventListener("keydown", function(ev){
    if(ev.key === "Escape" && modalBackdrop.classList.contains("open")) closeModal();
  });

  document.getElementById("manualToggle").addEventListener("click", function(ev){
    ev.preventDefault();
    document.getElementById("manualForm").classList.toggle("open");
  });

  document.getElementById("manualAddBtn").addEventListener("click", function(){
    var title = document.getElementById("manualTitle").value.trim();
    if(!title){
      showToast("Give it a title first.");
      return;
    }
    var totalRaw = document.getElementById("manualTotal").value;
    var image = document.getElementById("manualImage").value.trim();
    addEntry({
      title: title,
      totalEpisodes: totalRaw ? Math.max(0, parseInt(totalRaw, 10)) : null,
      image: image
    });
    showToast('Added "' + title + '" to your log.');
    document.getElementById("manualTitle").value = "";
    document.getElementById("manualTotal").value = "";
    document.getElementById("manualImage").value = "";
  });

  function resultRowHtml(item){
    var img = item.image
      ? '<img src="' + escapeHtml(item.image) + '" alt="">'
      : '<div class="poster-fallback" aria-hidden="true">🎬</div>';
    var sub = [item.type, item.year, item.episodes ? (item.episodes + " ep") : "ongoing/unknown"]
      .filter(Boolean).join(" · ");
    var already = state.entries.some(function(e){ return e.malId === item.malId; }) || state.addedApiIds[item.malId];
    return (
      '<div class="result-row">' +
        img +
        '<div class="result-info">' +
          '<div class="result-title">' + escapeHtml(item.title) + "</div>" +
          '<div class="result-sub">' + escapeHtml(sub) + "</div>" +
        "</div>" +
        '<button class="result-add-btn" data-malid="' + item.malId + '"' + (already ? " disabled" : "") + ">" +
          (already ? "Added ✓" : "Add") +
        "</button>" +
      "</div>"
    );
  }

  var lastResults = [];
  function renderResults(items){
    lastResults = items;
    if(items.length === 0){
      resultsList.innerHTML = "";
      searchStatus.textContent = "No matches. Try a different spelling, or add it manually below.";
      return;
    }
    searchStatus.textContent = "";
    resultsList.innerHTML = items.map(resultRowHtml).join("");
  }

  resultsList.addEventListener("click", function(ev){
    var btn = ev.target.closest(".result-add-btn");
    if(!btn || btn.disabled) return;
    var malId = btn.getAttribute("data-malid");
    var item = lastResults.find(function(r){ return String(r.malId) === String(malId); });
    if(!item) return;
    addEntry(item);
    state.addedApiIds[item.malId] = true;
    btn.disabled = true;
    btn.textContent = "Added ✓";
    showToast('Added "' + item.title + '" to your log.');
  });

  function searchJikan(query){
    searchStatus.textContent = "Searching…";
    resultsList.innerHTML = "";
    fetch("https://api.jikan.moe/v4/anime?q=" + encodeURIComponent(query) + "&limit=8&sfw=true")
      .then(function(res){
        if(res.status === 429){ throw new Error("rate-limited"); }
        if(!res.ok){ throw new Error("bad-response"); }
        return res.json();
      })
      .then(function(json){
        var items = (json.data || []).map(function(d){
          var img = d.images && d.images.jpg
            ? (d.images.jpg.image_url || "")
            : "";
          return {
            malId: d.mal_id,
            title: d.title,
            image: img,
            episodes: d.episodes || null,
            totalEpisodes: d.episodes || null,
            year: d.year || (d.aired && d.aired.prop && d.aired.prop.from ? d.aired.prop.from.year : null),
            type: d.type || ""
          };
        });
        renderResults(items);
      })
      .catch(function(err){
        if(err.message === "rate-limited"){
          searchStatus.textContent = "Searching too fast — wait a second and try again.";
        } else {
          searchStatus.textContent = "Couldn't reach the anime database right now. You can add it manually below.";
        }
      });
  }

  searchInput.addEventListener("input", function(){
    var q = searchInput.value.trim();
    clearTimeout(state.searchTimer);
    if(q.length < 2){
      resultsList.innerHTML = "";
      searchStatus.textContent = "";
      return;
    }
    state.searchTimer = setTimeout(function(){ searchJikan(q); }, 450);
  });

  // ---------- export / import ----------
  document.getElementById("exportBtn").addEventListener("click", function(){
    var blob = new Blob([JSON.stringify(state.entries, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = "watch-log-" + date + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Backup downloaded.");
  });

  var importFile = document.getElementById("importFile");
  document.getElementById("importBtn").addEventListener("click", function(){
    importFile.value = "";
    importFile.click();
  });
  importFile.addEventListener("change", function(){
    var file = importFile.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var parsed = JSON.parse(reader.result);
        if(!Array.isArray(parsed)) throw new Error("not-array");
        var ok = confirm("Import " + parsed.length + " title(s)? This replaces your current log of " + state.entries.length + " title(s).");
        if(!ok) return;
        state.entries = parsed.map(function(e){
          return {
            id: e.id || uid(),
            malId: e.malId || null,
            title: e.title || "Untitled",
            image: e.image || "",
            season: e.season || "",
            status: statusMeta[e.status] ? e.status : "plan",
            currentEpisode: Number(e.currentEpisode) || 0,
            totalEpisodes: e.totalEpisodes || null,
            updatedAt: e.updatedAt || Date.now()
          };
        });
        saveEntries();
        render();
        showToast("Import complete.");
      }catch(err){
        showToast("That file doesn't look like a valid Watch Log export.");
      }
    };
    reader.readAsText(file);
  });

  // ---------- init ----------
  render();
})();
</script>
</body>
</html>
